<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>August 8th?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Cutesy soft pink gradient */
            background: linear-gradient(120deg, #ffdde1 0%, #ee9ca7 100%);
            /* Slightly more playful, rounded font stack */
            font-family: 'Comic Sans MS', 'Segoe UI', cursive, sans-serif;
        }
        .card {
            background-color: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(238, 156, 167, 0.6);
            text-align: center;
            max-width: 90%;
            width: 400px;
            border: 3px solid #ffb6c1;
        }
        .icon {
            font-size: 70px;
            margin-bottom: 10px;
        }
        h1 {
            color: #ff6b81;
            font-size: 1.5rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            min-height: 70px;
        }
        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        #yes-btn {
            background-color: #ff6b81;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
        }
        #yes-btn:hover {
            background-color: #ff4757;
            transform: translateY(-2px);
        }
        #no-btn {
            background-color: #f1f2f6;
            color: #747d8c;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        #response-message {
            margin-top: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff4757;
            min-height: 30px;
        }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div class="icon" id="header-icon">🍿🎬</div>
    
    <h1 id="question-text">Would you do me the honor of going on a movie date with me on August 8th?</h1>
    
    <div class="buttons" id="button-group">
        <button id="yes-btn">Yes!</button>
        <button id="no-btn">No</button>
    </div>

    <div id="response-message"></div>
</div>

<script>
    const yesBtn = document.getElementById('yes-btn');
    const noBtn = document.getElementById('no-btn');
    const responseMessage = document.getElementById('response-message');
    const questionText = document.getElementById('question-text');
    const buttonGroup = document.getElementById('button-group');
    const headerIcon = document.getElementById('header-icon');

    // Variable to track how much the 'No' button shrinks
    let noScale = 1;

    noBtn.addEventListener('click', function() {
        // Display the new cutesy message and blush emoji
        responseMessage.innerText = "Please click yes 😳";
        
        // Shrink the 'No' button
        if (noScale > 0.2) {
            noScale -= 0.2;
            noBtn.style.transform = `scale(${noScale})`;
        }
        
        // Make the 'Yes' button grow
        let currentYesScale = yesBtn.style.transform.match(/scale\(([0-9.]+)\)/);
        let yesScaleValue = currentYesScale ? parseFloat(currentYesScale[1]) : 1;
        yesBtn.style.transform = `scale(${yesScaleValue + 0.15})`;
    });

    yesBtn.addEventListener('click', function() {
        // Super cute success state!
        headerIcon.innerText = "🥰🎉";
        questionText.innerText = "Yay! It's a date! I'll secure the tickets and the popcorn.";
        buttonGroup.style.display = 'none';
        responseMessage.innerText = "";
    });
</script>

</body>
</html>
